  <!-- NIGHT MODE SCRIPT -->

  <script>

    function toggleMode(){

      document.body.classList.toggle("night");

      const button = document.querySelector(".modeToggle");

      if(document.body.classList.contains("night")){

        button.innerHTML = "✨ Day Mode";

      } else {

        button.innerHTML = "🌙 Night Mode";
      }
    }
