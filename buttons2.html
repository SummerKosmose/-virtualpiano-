<style>
  .SUBSCRIBE{
    background-color: rgb(223, 2, 2);
    color: white;
    cursor: pointer;
    border-style: solid;
    border-color: rgb(223, 2, 2);
    transition: opacity 0.15s;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-right: 13px;
    padding-left: 13px;
      }
</style>
<button class="SUBSCRIBE">SUBSCRIBE</button>

<style>
  .JOIN{
    background-color: rgb(255, 255, 255);
    border-color: rgb(9, 126, 203);
    border-style: solid;
    cursor:pointer;
    margin-left: 5px;
    height: 40px;
    width: 110px;
    border-width: 2px;
    color:rgb(9, 126, 203) ;
    border-radius: 2px;
    transition:background-color 0.15s ,color 0.15s ;
  }
</style>
<button class="JOIN">JOIN</button>

<style>
  .TWEET{
    height: 40px;
    width: 110px;
    background-color: rgb(69, 178, 250);
    border-color:rgb(69, 178, 250) ;
    border-radius: 30px;
    border-style: solid;
    color: white;
    cursor: pointer;
    margin-left: 5px;
    transition:box-shadow 0.15s ;
     
  }

  .SUBSCRIBE:hover{
    opacity: 0.6;
  }
  .SUBSCRIBE:active{
    opacity: 1;
  }
  .JOIN:hover{
    background-color:rgb(17, 139, 220) ;
    color:white;
    opacity: 0.6;
  }
  
  .JOIN:active{
    background-color: white;
    color:rgb(17, 139, 220) ;
  }
  .TWEET:hover{
     box-shadow: 3px 3px 7px rgb(150, 148, 148) ;
  }
  .TWEET:active{
    box-shadow:3px 3px 7px rgb(93, 92, 92) ;
  }

</style>




<button class="TWEET">TWEET</button>
